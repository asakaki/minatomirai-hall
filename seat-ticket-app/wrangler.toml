name = "seat-ticket-app"
pages_build_output_dir = "."
compatibility_date = "2024-09-23"

# Cloudflare D1（座席データの永続化）
# 本番は `wrangler d1 create seat-ticket-db` で発行された database_id に置き換える
# （ローカル開発はこの設定で自動的にローカルSQLiteが使われます）
[[d1_databases]]
binding = "DB"
database_name = "seat-ticket-db"
database_id = "local"
